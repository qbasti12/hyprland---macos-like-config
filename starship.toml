"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

# Alles auf einer einzigen Zeile
format = """$os$directory$git_branch$git_status$character"""

# Leere Zeile für die Übersicht
add_newline = true

[os]
disabled = true
# Ein definiertes Leerzeichen nach dem Logo
format = "[$symbol ]($style)"
style = "bold sapphire"

[os.symbols]
Arch = ""

[directory]
# Rein textbasierter Pfad
format = "[$path]($style)"
style = "bold lavender"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
format = " [ $branch]($style)"
style = "italic overlay1"

[git_status]
format = ' [$all_status$ahead_behind]($style)'
style = "maroon"
conflicted = "󰞇 "
up_to_date = ""
untracked = "? "
modified = "! "
stashed = "󰏢 "

[character]
success_symbol = " [❯](bold green) "
error_symbol = " [❯](bold red) "
vicmd_symbol = " [❮](bold peach) "

